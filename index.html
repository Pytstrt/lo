<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
               background: #fff0f5; font-family: sans-serif; overflow: hidden; position: relative; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
                text-align: center; width: 80%; max-width: 300px; z-index: 10; }
        .btn-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: 2px solid #ff9a9e; background: white; color: #ff9a9e; 
                 border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; touch-action: manipulation; }
        button:hover { background: #ff9a9e; color: white; }
        
        .heart { position: absolute; top: -20px; color: #ff4d6d; font-size: 20px; 
                 animation: fall 5s linear infinite; pointer-events: none; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="question">Ek sawaal poochu?</h2>
        <div class="btn-container" id="buttons"></div>
    </div>

    <script>
        const steps = [
            { q: "Ek sawaal poochu?", b: ["Shayad", "Ho sakta hai"], next: 1 },
            { q: "Kuch mahino mein tumhein bhi kuch alag sa laga?", b: ["Bolo na...", "Haan, thoda"], next: 2 },
            { q: "Sach batao. Kabhi phone dekh ke bewajah smile aayi hai?", b: ["Nahi 🙈", "Guilty"], next: 3 },
            { q: "Mere banoge? 💍", b: ["Haan, banungi", "Nahi"], next: 4 },
            { q: "Pakka ho gaya! 🧸💖", b: [] }
        ];

        function moveButton(btn) {
            btn.style.position = 'fixed'; // fixed use kiya taaki screen pe kahi bhi bhage
            btn.style.left = Math.random() * 70 + 10 + '%';
            btn.style.top = Math.random() * 70 + 10 + '%';
        }

        function nextStep(i) {
            if (i >= steps.length) return;
            document.getElementById('question').innerText = steps[i].q;
            const bDiv = document.getElementById('buttons');
            bDiv.innerHTML = '';
            
            steps[i].b.forEach(text => {
                const btn = document.createElement('button');
                btn.innerText = text;
                
                if (text.includes("Nahi")) {
                    // Laptop ke liye
                    btn.onmouseover = () => moveButton(btn);
                    // Phone ke liye
                    btn.ontouchstart = (e) => {
                        e.preventDefault();
                        moveButton(btn);
                    };
                } else {
                    btn.onclick = () => nextStep(i + 1);
                }
                bDiv.appendChild(btn);
            });
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '❤️'; h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 500);

        nextStep(0);
    </script>
</body>
</html>
